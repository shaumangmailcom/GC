<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contractor Draw Portal</title>
  <link href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Light Mode Theme Overrides */
    .light-mode-theme { background-color: #f0f2f5 !important; }
    .light-mode-theme main { background-color: #ffffff !important; border: 1px solid #e2e8f0; }
    .light-mode-theme header h1 { color: #1a202c !important; }
  </style>
</head>

<body id="bodyTag" class="bg-gray-50 min-h-screen">
  <div id="pinModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50">
    <div class="bg-white rounded-2xl p-6 md:p-8 w-full max-w-md shadow-2xl">
      <p id="t-secureAccess" class="text-xs uppercase tracking-[0.2em] text-slate-500">Secure Access</p>
      <h2 id="t-enterPin" class="text-2xl font-semibold text-slate-900 mt-2">Enter Contractor PIN</h2>
      <p id="t-pinInstruction" class="text-sm text-slate-600 mt-2">Use your 4-digit PIN.</p>

      <form id="pinForm" class="mt-5 space-y-4">
        <div class="space-y-2">
          <label id="t-pinLabel" for="pinInput" class="block text-sm font-medium text-slate-700">4-digit PIN</label>
          <input id="pinInput" type="text" inputmode="numeric" pattern="[0-9]{4}" maxlength="4" required placeholder="1234"
            class="w-full rounded-xl border border-slate-200 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-slate-900/50 tracking-[0.3em] text-center text-lg" />
          <p id="pinError" class="text-xs text-rose-600 hidden"></p>
        </div>
        <div class="flex justify-end">
          <button type="submit" id="pinSubmit" class="inline-flex items-center gap-2 bg-slate-900 text-white px-4 py-2.5 rounded-xl font-semibold hover:bg-slate-800 transition disabled:opacity-60">
            Continue
          </button>
        </div>
      </form>
    </div>
  </div>

  <div id="successModal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50">
    <div class="bg-white rounded-2xl p-6 md:p-8 w-full max-w-md shadow-2xl text-center">
      <h2 id="t-successTitle" class="text-2xl font-semibold text-slate-900 mt-2">Request Submitted</h2>
      <p id="successText" class="text-sm text-slate-600 mt-2">Your draw request was submitted.</p>
      <div class="mt-6 flex justify-center">
        <button id="successOkBtn" class="bg-slate-900 text-white px-8 py-2.5 rounded-xl font-semibold hover:bg-slate-800 transition">OK</button>
      </div>
    </div>
  </div>

  <div class="max-w-6xl mx-auto px-4 py-10">
    <header class="mb-8 text-center">
      <p id="t-portalHeader" class="text-sm uppercase tracking-[0.2em] text-slate-500">Contractor Draw Portal</p>
      <h1 id="headerContractorName" class="text-3xl md:text-4xl font-semibold text-slate-900 mt-2">—</h1>
    </header>

    <main class="bg-white rounded-2xl p-6 md:p-8 shadow-xl">
      <form id="drawForm" class="space-y-8">
        <section class="grid md:grid-cols-2 gap-6">
          <div class="space-y-2">
            <label id="t-labelProject" class="block text-sm font-medium text-slate-700">Project</label>
            <select id="projectSelect" class="w-full rounded-xl border border-slate-200 px-4 py-3" required></select>
          </div>

          <div class="space-y-2">
            <label id="t-labelDate" class="block text-sm font-medium text-slate-700">Date of Work</label>
            <input id="workDate" type="text" class="w-full rounded-xl border border-slate-200 px-4 py-3" required />
          </div>
        </section>

        <section id="tradeSection" class="grid md:grid-cols-1 gap-6">
          <div class="space-y-2">
            <label id="t-labelTradeAmount" class="block text-sm font-medium text-slate-700">Trade & Amount</label>
            <div id="lineItems" class="bg-slate-50 p-4 rounded-xl border border-slate-100 grid md:grid-cols-3 gap-4">
               <div>
                 <label id="t-subTrade" class="text-xs font-semibold text-slate-500 uppercase">Trade</label>
                 <select id="tradeSelect" class="w-full mt-1 rounded-lg border border-slate-200 px-3 py-2 bg-white" required></select>
               </div>
               <div>
                 <label id="t-subBudget" class="text-xs font-semibold text-slate-500 uppercase">Available</label>
                 <div id="remainingLabel" class="mt-1 text-lg font-bold text-emerald-700">—</div>
               </div>
               <div>
                 <label id="t-subAmount" class="text-xs font-semibold text-slate-500 uppercase">Amount</label>
                 <input id="amountInput" type="number" step="0.01" class="w-full mt-1 rounded-lg border border-slate-200 px-3 py-2 bg-white" required />
               </div>
            </div>
          </div>
        </section>

        <section class="grid md:grid-cols-2 gap-6 pt-4">
          <div class="space-y-2">
            <label id="t-labelUpload" class="block text-sm font-medium text-slate-700">Upload Files</label>
            <div id="dropzone" class="border-2 border-dashed border-slate-200 rounded-xl px-4 py-8 text-center bg-slate-50 cursor-pointer">
              <p id="t-dropText" class="text-slate-800 font-medium">Drag & drop PDF/images</p>
              <input id="fileInput" type="file" multiple class="hidden" />
              <div id="fileInfo" class="text-sm text-slate-700 mt-3 italic"></div>
            </div>
          </div>

          <div class="flex flex-col justify-end">
            <button id="submitBtn" type="submit" class="w-full bg-slate-900 text-white px-5 py-4 rounded-xl font-bold text-lg hover:bg-slate-800 transition">
              Submit Draw Request
            </button>
            <p id="submitMessage" class="text-xs text-rose-600 mt-2 text-center"></p>
          </div>
        </section>
      </form>
    </main>

    <section class="mt-10 bg-white rounded-2xl p-6 md:p-8 shadow-xl">
       <h2 id="t-historyTitle" class="text-xl font-semibold text-slate-900 mb-4">Payment History</h2>
       <div class="overflow-x-auto">
         <table class="min-w-full text-left text-sm">
           <thead>
             <tr class="text-slate-500 border-b">
               <th id="t-thProject" class="py-3 pr-4">Project</th>
               <th id="t-thTrade" class="py-3 pr-4">Trade</th>
               <th id="t-thAmount" class="py-3 pr-4">Amount</th>
               <th id="t-thStatus" class="py-3 pr-4">Status</th>
             </tr>
           </thead>
           <tbody id="statusTable" class="divide-y divide-slate-100"></tbody>
         </table>
       </div>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzHH6DEgjr-jexZGuqDk9kpzIBL4SeDAGzS62KcIS1Lehy8nnX3_fWfWv4yKYhccZs9Kg/exec';

    const translations = {
      en: {
        secureAccess: "Secure Access", enterPin: "Enter Contractor PIN", pinInstruction: "Use your 4-digit PIN.", pinLabel: "4-digit PIN",
        portalHeader: "Contractor Draw Portal", labelProject: "Project", labelDate: "Date of Work", labelTradeAmount: "Trade & Amount",
        subTrade: "Trade", subBudget: "Available", subAmount: "Amount", labelUpload: "Upload Files", dropText: "Drag & drop PDF/images",
        submitBtn: "Submit Draw Request", successTitle: "Request Submitted", historyTitle: "Payment History", thProject: "Project",
        thTrade: "Trade", thAmount: "Amount", thStatus: "Status"
      },
      es: {
        secureAccess: "Acceso Seguro", enterPin: "Ingrese el PIN", pinInstruction: "Use su PIN de 4 dígitos.", pinLabel: "PIN de 4 dígitos",
        portalHeader: "Portal de Pagos para Contratistas", labelProject: "Proyecto", labelDate: "Fecha de Trabajo", labelTradeAmount: "Oficio y Monto",
        subTrade: "Oficio", subBudget: "Disponible", subAmount: "Monto", labelUpload: "Subir Archivos", dropText: "Arrastre archivos PDF o imágenes aquí",
        submitBtn: "Enviar Solicitud de Pago", successTitle: "Solicitud Enviada", historyTitle: "Historial de Pagos", thProject: "Proyecto",
        thTrade: "Oficio", thAmount: "Monto", thStatus: "Estado"
      }
    };

    const state = { pin: '', contractor: null, budgets: [], invoiceFiles: [] };
    const $ = (id) => document.getElementById(id);

    async function verifyPin(pin) {
      const r = await fetch(`${SCRIPT_URL}?action=verifyPin&pin=${pin}`);
      const d = await r.json();
      return d?.ok ? d.contractor : null;
    }

    function applyTranslations(lang) {
      const t = translations[lang];
      Object.keys(t).forEach(id => {
        const el = $(`t-${id}`) || $(id);
        if (el) el.innerText = t[id];
      });
    }

    function setupUI(contractor) {
      state.contractor = contractor;
      
      // Strict check for boolean values
      const isSpanish = (contractor.isSpanish === true);
      const isLight = (contractor.isLight === true);
      const lang = isSpanish ? 'es' : 'en';

      applyTranslations(lang);

      if (isLight) {
        $('bodyTag').classList.add('light-mode-theme');
        $('fileInput').required = false;
      } else {
        $('bodyTag').classList.remove('light-mode-theme'); // Explicitly remove to prevent stickiness
        $('fileInput').required = true;
      }

      const dateInput = $('workDate');
      let defaultDate = new Date();
      
      // Date Logic: Light = Today, Regular = Today + 3 days
      if (!isLight) {
        defaultDate.setDate(defaultDate.getDate() + 3);
      }
      
      flatpickr(dateInput, {
        defaultDate: defaultDate,
        dateFormat: 'm/d/Y',
        minDate: isLight ? "today" : new Date().fp_incr(3)
      });

      $('headerContractorName').textContent = contractor.name;
      $('pinModal').classList.add('hidden');
      loadBudgets();
      loadDraws();
    }

    async function loadBudgets() {
      const r = await fetch(`${SCRIPT_URL}?action=getBudgets&pin=${state.pin}`);
      const d = await r.json();
      state.budgets = d.budgets || [];
      
      const ps = $('projectSelect');
      ps.innerHTML = '<option value="" disabled selected>Select Project</option>';
      
      state.contractor.projects.forEach(p => ps.add(new Option(p, p)));

      ps.onchange = () => {
        const ts = $('tradeSelect');
        ts.innerHTML = '';
        
        const trades = state.budgets.filter(b => b.project === ps.value);
        trades.forEach(t => ts.add(new Option(t.trade, t.trade)));
        
        // Auto-select and update label immediately for Light Mode
        if (state.contractor.isLight && trades.length > 0) {
           ts.selectedIndex = 0;
           $('remainingLabel').textContent = `$${trades[0].remaining.toLocaleString()}`;
        } else {
           // Standard version: Add placeholder
           const placeholder = new Option("Select Trade", "");
           placeholder.disabled = true;
           placeholder.selected = true;
           ts.add(placeholder, ts.options[0]);
           $('remainingLabel').textContent = '—';
        }
      };

      $('tradeSelect').onchange = (e) => {
        const b = state.budgets.find(x => x.project === ps.value && x.trade === e.target.value);
        $('remainingLabel').textContent = b ? `$${b.remaining.toLocaleString()}` : '—';
      };
    }

    async function loadDraws() {
      const r = await fetch(`${SCRIPT_URL}?action=getDraws&pin=${state.pin}`);
      const d = await r.json();
      const tbody = $('statusTable');
      tbody.innerHTML = (d.draws || []).map(draw => `
        <tr>
          <td class="py-3">${draw.project}</td>
          <td class="py-3">${draw.trade}</td>
          <td class="py-3">$${draw.amount.toLocaleString()}</td>
          <td class="py-3"><span class="px-2 py-1 rounded text-xs font-bold bg-slate-100">${draw.status}</span></td>
        </tr>
      `).join('');
    }

    $('pinForm').onsubmit = async (e) => {
      e.preventDefault();
      const pin = $('pinInput').value;
      const c = await verifyPin(pin);
      if (c) {
        state.pin = pin;
        setupUI(c);
      } else {
        alert("PIN Error");
      }
    };

    $('dropzone').onclick = () => $('fileInput').click();
    $('fileInput').onchange = async (e) => {
       const files = Array.from(e.target.files);
       state.invoiceFiles = [];
       for (const f of files) {
         const reader = new FileReader();
         reader.onload = (ev) => state.invoiceFiles.push({ name: f.name, mimeType: f.type, base64: ev.target.result.split(',')[1] });
         reader.readAsDataURL(f);
       }
       $('fileInfo').textContent = `${files.length} file(s) ready`;
    };

    $('drawForm').onsubmit = async (e) => {
      e.preventDefault();
      const payload = {
        action: 'submitDraw',
        pin: state.pin,
        Project: $('projectSelect').value,
        WorkDate: $('workDate').value,
        LineItems: [{ trade: $('tradeSelect').value, amount: Number($('amountInput').value) }],
        files: state.invoiceFiles
      };

      await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
      $('successModal').classList.remove('hidden');
    };

    $('successOkBtn').onclick = () => location.reload();
  </script>
</body>
</html>
